name: Sync OpenClaw WEB UI 网页版
on:
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      packages: write
      contents: read
    steps:
      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Pull 带网页UI的完整镜像
        run: docker pull ghcr.io/andrewstech/openclaw-webui:latest

      - name: 重命名到你的私人仓库
        run: docker tag ghcr.io/andrewstech/openclaw-webui:latest ghcr.io/csr-boory/openclaw-web:latest

      - name: 推送到你的私人仓库
        run: docker push ghcr.io/csr-boory/openclaw-web:latest

      - name: 设置为公开
        run: |
          curl -X PATCH \
          -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
          -H "Accept: application/vnd.github+json" \
          https://api.github.com/user/packages/container/openclaw-web \
          -d '{"visibility":"public"}'
