name: 同步 OpenClaw 完整增强版（带网页+IM机器人）
on:
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      packages: write
      contents: read
    steps:
      - name: 登录 GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: 拉取原版增强镜像
        run: docker pull justlikemaki/openclaw-docker-cn-im:latest

      - name: 推送到你的第二个私有仓库
        run: |
          docker tag justlikemaki/openclaw-docker-cn-im:latest ghcr.io/csr-boory/openclaw-im:latest
          docker push ghcr.io/csr-boory/openclaw-im:latest

      - name: 设置为公开（可拉取）
        run: |
          curl -X PATCH \
          -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
          -H "Accept: application/vnd.github+json" \
          https://api.github.com/user/packages/container/openclaw-im \
          -d '{"visibility":"public"}'
