name: Sync OpenClaw to Your GHCR

on:
  workflow_dispatch:
  schedule:
    - cron: '0 0 * * *'

jobs:
  sync-image:
    runs-on: ubuntu-latest
    steps:
      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Pull & Push OpenClaw
        run: |
          docker pull ghcr.io/openclaw/openclaw:latest
          docker tag ghcr.io/openclaw/openclaw:latest ghcr.io/csr-boory/openclaw:latest
          docker push ghcr.io/csr-boory/openclaw:latest
