name: Sync OpenClaw WEB UI to GHCR
on:
  workflow_dispatch:
  schedule:
    - cron: '0 0 * * *'

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      packages: write
      contents: read
    steps:
      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Pull official OpenClaw WEB UI
        run: docker pull ghcr.io/openclaw/web:latest

      - name: Tag to your private GHCR
        run: docker tag ghcr.io/openclaw/web:latest ghcr.io/csr-boory/openclaw:latest

      - name: Push and set public
        run: |
          docker push ghcr.io/csr-boory/openclaw:latest
          curl -X PATCH \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
            https://api.github.com/user/packages/container/openclaw \
            -d '{"visibility":"public"}'
