name: 同步国内镜像到私仓

on:
  workflow_dispatch: # 允许手动触发

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: 同步 Ollama 镜像
        uses: docker/build-push-action@v5
        with:
          # 直接从国内 DaoCloud 拉取源镜像
          context: https://docker.m.daocloud.io/ollama/ollama:latest
          push: true
          tags: ghcr.io/${{ github.repository_owner }}/ollama:latest
          # 利用 GitHub 自带的令牌登录（不需要你手动填账号密码）
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: 同步 Open WebUI 镜像
        uses: docker/build-push-action@v5
        with:
          context: https://docker.m.daocloud.io/ghcr.io/open-webui/open-webui:main
          push: true
          tags: ghcr.io/${{ github.repository_owner }}/open-webui:latest
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
