name: Sync Ollama & WebUI

on:
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: 登录 GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # 同步 Ollama
      - run: docker pull ghcr.io/ollama/ollama:latest
      - run: docker tag ghcr.io/ollama/ollama:latest ghcr.io/${{ github.repository_owner }}/ollama:latest
      - run: docker push ghcr.io/${{ github.repository_owner }}/ollama:latest

      # 同步 Open WebUI
      - run: docker pull ghcr.io/open-webui/open-webui:main
      - run: docker tag ghcr.io/open-webui/open-webui:main ghcr.io/${{ github.repository_owner }}/open-webui:main
      - run: docker push ghcr.io/${{ github.repository_owner }}/open-webui:main
