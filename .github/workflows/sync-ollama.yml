name: Sync Ollama to GHCR

on:
  schedule:
    - cron: '0 0 * * 0' # 每周日自动同步一次
  workflow_dispatch: # 手动触发

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: 配置 Docker 国内加速
        run: |
          echo '{ "registry-mirrors": ["https://docker.m.daocloud.io"] }' | sudo tee /etc/docker/daemon.json
          sudo systemctl daemon-reload
          sudo systemctl restart docker

      - name: 登录 GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ secrets.GHCR_USERNAME }}
          password: ${{ secrets.GHCR_TOKEN }}

      - name: 同步 Ollama 镜像
        uses: docker/build-push-action@v5
        with:
          pull: true
          push: true
          tags: ghcr.io/${{ secrets.GHCR_USERNAME }}/ollama:latest
          pull-push: true
          source: docker.io/ollama/ollama:latest
