name: Sync Ollama & WebUI from China Mirror

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Sync Ollama
        uses: akhilmhdh/containers-actions-copy@v0.0.2
        with:
          source_image: docker.m.daocloud.io/ollama/ollama:latest
          destination_image: ghcr.io/${{ github.repository_owner }}/ollama:latest
          DOCKERHUB_USERNAME: ${{ github.repository_owner }}
          DOCKERHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Sync Open WebUI
        uses: akhilmhdh/containers-actions-copy@v0.0.2
        with:
          source_image: docker.m.daocloud.io/open-webui/open-webui:main
          destination_image: ghcr.io/${{ github.repository_owner }}/open-webui:main
          DOCKERHUB_USERNAME: ${{ github.repository_owner }}
          DOCKERHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
